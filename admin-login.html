<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Dremora</title>
  
  <meta name="description" content="Secure administration portal for Dremora.">
  <meta name="theme-color" content="#090909">
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Dremora Design System -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .login-hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -50px; animation-delay: 0s; }
    .blob-2 { width: 450px; height: 450px; background: #7c3aed; bottom: -100px; left: -100px; animation-delay: -3s; }
    
    .login-hero-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: var(--space-6);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-2xl);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-header img {
      height: 48px;
      margin-bottom: var(--space-4);
    }

    .login-header h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--text-base);
      transition: all 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: var(--space-6);
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }
    
    .error-box.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-spinner { display: block; }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <main class="login-page">
    <div class="login-hero-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="login-container">
      <div class="auth-card">
        <div class="login-header">
          <img src="assets/images/logo.png" alt="Dremora Logo">
          <h1>Admin Portal</h1>
        </div>

        <div id="adminError" class="error-box">
          <span id="adminErrorText"></span>
        </div>

        <form id="adminForm">
          <div class="form-group">
            <label for="adminEmail">Email Address or Admin ID</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 512 512"><use href="#fa-envelope"></use></svg>
              <input type="text" id="adminEmail" placeholder="admin@dremora.com" required autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label for="adminPassword">Password</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 384 512"><use href="#fa-lock"></use></svg>
              <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>

          <button type="submit" id="btnAdminSubmit" class="btn">
            <span class="btn-text">Sign In</span>
            <div class="btn-spinner"></div>
          </button>
        </form>
      </div>
    </div>
  </main>

  <svg id="global-svg-sprite" xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="fa-envelope" viewBox="0 0 512 512"><path d="M48 64C21.5 64 0 85.5 0 112c0 15.1 7.1 29.3 19.2 38.4L236.8 313.6c11.4 8.5 27 8.5 38.4 0L492.8 150.4c12.1-9.1 19.2-23.3 19.2-38.4c0-26.5-21.5-48-48-48H48zM0 176V384c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V176L294.4 339.2c-22.8 17.1-54 17.1-76.8 0L0 176z"/></symbol>
    <symbol id="fa-lock" viewBox="0 0 448 512"><path d="M144 144v48H304V144c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192V144C80 64.5 144.5 0 224 0s144 64.5 144 144v48h16c26.5 0 48 21.5 48 48V464c0 26.5-21.5 48-48 48H64c-26.5 0-48-21.5-48-48V240c0-26.5 21.5-48 48-48H80z"/></symbol>
  </svg>

  <!-- Supabase SDK & Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('adminForm');
      const btn = document.getElementById('btnAdminSubmit');
      const errBox = document.getElementById('adminError');
      const errText = document.getElementById('adminErrorText');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        
        errBox.classList.remove('show');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
          // Phase 6: Admin uses Supabase Auth
          const { data, error } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });
          
          if (error) {
            throw new Error(error.message || 'Invalid credentials');
          }

          // Success - Redirect to dashboard
          window.location.href = 'admin-dashboard.html';

        } catch (error) {
          errText.textContent = error.message;
          errBox.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
