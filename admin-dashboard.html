<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Dremora</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Layout */
    .admin-layout {
      display: flex;
      min-height: 100vh;
      background: var(--bg-primary);
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 40;
    }

    .sidebar-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .sidebar-header img { height: 28px; }
    
    .sidebar-nav {
      flex: 1;
      padding: var(--space-6) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      overflow-y: auto;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      color: var(--text-secondary);
      border-radius: var(--radius-md);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .nav-item:hover, .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: rgba(37, 99, 235, 0.1);
      color: var(--accent-bright);
      border-left: 3px solid var(--accent);
    }
    
    .nav-item svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .topbar {
      height: 70px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-8);
      flex-shrink: 0;
    }
    
    .user-profile {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .page-content {
      flex: 1;
      padding: var(--space-8);
      overflow-y: auto;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-lg);
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .stat-icon svg { width: 24px; height: 24px; }
    
    /* Tables */
    .data-table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    
    .table-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-actions {
      display: flex;
      gap: var(--space-3);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: var(--space-4) var(--space-6);
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: var(--text-sm);
    }
    
    th {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.75rem;
    }
    
    td { color: var(--text-primary); }
    
    tr:hover td { background: rgba(255, 255, 255, 0.02); }
    
    /* Status Badges */
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.active { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge.inactive { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .badge.completed { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--text-primary); }
    .btn-outline:hover { background: var(--bg-tertiary); }
    
    /* Form Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
    
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-body {
      padding: var(--space-6);
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .form-group label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
    .form-group input, .form-group select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px;
      border-radius: var(--radius-md);
      font-family: inherit;
    }
    
    .screen { display: none; }
    .screen.active { display: block; }
    /* Profile Picture Upload */
    .upload-container { display: flex; flex-direction: column; align-items: center; gap: var(--space-4); margin-bottom: var(--space-4); }
    .upload-zone { width: 120px; height: 120px; border-radius: 50%; border: 2px dashed var(--border); background: var(--bg-tertiary); position: relative; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: border-color 0.3s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-primary); }
    .upload-preview { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; color: white; font-size: 0.75rem; }
    .upload-zone:hover .upload-overlay { opacity: 1; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 0.75rem; text-align: center; padding: 1rem; pointer-events: none; }
    .upload-placeholder svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; }
    .upload-actions { display: flex; gap: var(--space-3); }
    .upload-progress-bar { width: 100%; height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .upload-progress-fill { height: 100%; background: var(--accent-primary); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body class="dark-theme">

  <!-- SVG Icons -->
  <svg style="display: none;">
    <symbol id="icon-dashboard" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></symbol>
    <symbol id="icon-users" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></symbol>
    <symbol id="icon-cert" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></symbol>
    <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
  </svg>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/images/logo.png" alt="Logo">
        <span style="font-weight:700; color:var(--text-primary)">Admin Panel</span>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active" onclick="switchTab('dashboard')">
          <svg><use href="#icon-dashboard"></use></svg> Dashboard
        </div>
        <div class="nav-item" onclick="switchTab('interns')">
          <svg><use href="#icon-users"></use></svg> Intern Management
        </div>
        <div class="nav-item" style="margin-top:auto" onclick="logout()">
          <svg><use href="#icon-logout"></use></svg> Logout
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2 style="font-size: 1.25rem; font-weight: 600;" id="pageTitle">Overview</h2>
        <div class="user-profile">
          <span style="color:var(--text-secondary); font-size:0.875rem;" id="adminName">Loading...</span>
          <div style="width:36px; height:36px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white;">A</div>
        </div>
      </header>

      <div class="page-content">
        
        <!-- DASHBOARD TAB -->
        <div id="tab-dashboard" class="screen active">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon" style="color:#3b82f6"><svg><use href="#icon-users"></use></svg></div>
              <div>
                <p style="color:var(--text-secondary); font-size:0.875rem">Total Interns</p>
                <h3 style="font-size:1.5rem; font-weight:700" id="statTotal">0</h3>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="color:#10b981"><svg><use href="#icon-users"></use></svg></div>
              <div>
                <p style="color:var(--text-secondary); font-size:0.875rem">Active</p>
                <h3 style="font-size:1.5rem; font-weight:700" id="statActive">0</h3>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="color:#8b5cf6"><svg><use href="#icon-cert"></use></svg></div>
              <div>
                <p style="color:var(--text-secondary); font-size:0.875rem">Completed</p>
                <h3 style="font-size:1.5rem; font-weight:700" id="statCompleted">0</h3>
              </div>
            </div>
          </div>
        </div>

        <!-- INTERNS TAB -->
        <div id="tab-interns" class="screen">
          <div class="data-table-wrapper">
            <div class="table-header">
              <h3>Intern Directory</h3>
              <div class="table-actions">
                <input type="text" id="searchInput" placeholder="Search interns..." style="background:var(--bg-tertiary); border:1px solid var(--border); border-radius:var(--radius-md); padding:8px 12px; color:white;">
                <button class="btn btn-primary" onclick="openModal()"><svg width="16" height="16" fill="currentColor"><use href="#icon-plus"></use></svg> Add Intern</button>
              </div>
            </div>
            <div style="overflow-x:auto;">
              <table>
                <thead>
                  <tr>
                    <th>Intern ID</th>
                    <th>Full Name</th>
                    <th>Domain</th>
                    <th>Status</th>
                    <th>Progress</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="internsTableBody">
                  <tr><td colspan="6" style="text-align:center; padding: 2rem;">Loading interns...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Intern Form Modal -->
  <div class="modal-overlay" id="internModal">
    <div class="modal">
      <div class="modal-header">
        <h2 style="font-size:1.25rem" id="modalTitle">Add New Intern</h2>
        <button class="btn-outline" style="border:none; padding:4px;" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="internForm">
          <input type="hidden" id="editId">
          <div class="grid-2">
            <div class="form-group">
              <label>Internship ID *</label>
              <input type="text" id="f_internId" required>
            </div>
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="f_fullName" required>
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="f_email" required>
            </div>
            <div class="form-group">
              <label>Domain</label>
              <input type="text" id="f_domain" placeholder="e.g. Web Development">
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Status</label>
              <select id="f_status">
                <option value="Active">Active</option>
                <option value="Completed">Completed</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
            <div class="form-group">
              <label>Progress (%)</label>
              <input type="number" id="f_progress" min="0" max="100" value="0">
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Start Date</label>
              <input type="date" id="f_start">
            </div>
            <div class="form-group">
              <label>End Date</label>
              <input type="date" id="f_end">
            </div>
          </div>
          <div class="upload-container" style="margin-top: 1rem;">
            <input type="file" id="f_photo_upload" accept="image/jpeg, image/png, image/webp" style="display:none">
            <input type="hidden" id="f_photo">
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('f_photo_upload').click()">
              <img id="uploadPreview" class="upload-preview" src="" alt="Profile Preview">
              <div class="upload-placeholder" id="uploadPlaceholder">
                <svg viewBox="0 0 512 512"><path d="M149.1 64.8L138.7 96H64C28.7 96 0 124.7 0 160V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V160c0-35.3-28.7-64-64-64H373.3L362.9 64.8C356.4 45.2 338.1 32 317.4 32H194.6c-20.7 0-39 13.2-45.5 32.8zM256 192a96 96 0 1 1 0 192 96 96 0 1 1 0-192z"/></svg>
                <span>Upload</span>
              </div>
              <div class="upload-overlay" id="uploadOverlay">
                <svg viewBox="0 0 512 512" style="width: 20px; height: 20px; fill: currentColor; margin-bottom: 4px;"><path d="M149.1 64.8L138.7 96H64C28.7 96 0 124.7 0 160V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V160c0-35.3-28.7-64-64-64H373.3L362.9 64.8C356.4 45.2 338.1 32 317.4 32H194.6c-20.7 0-39 13.2-45.5 32.8zM256 192a96 96 0 1 1 0 192 96 96 0 1 1 0-192z"/></svg>
                <span>Replace</span>
              </div>
            </div>
            <div class="upload-progress-bar" id="uploadProgressBar"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
            <div class="upload-actions">
              <button type="button" class="btn btn-outline" style="font-size: 0.75rem; padding: 4px 8px;" onclick="removeProfileImage()" id="btnRemoveImage">Remove Image</button>
            </div>
          </div>
          <div style="margin-top:var(--space-6); display:flex; justify-content:flex-end; gap:var(--space-3)">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btnSaveIntern">Save Intern</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Supabase SDK & Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>

  <script>
    let allInterns = [];

    document.addEventListener('DOMContentLoaded', async () => {
      // Authenticate via Supabase Auth
      try {
        const { data: { session }, error } = await window.supabaseClient.auth.getSession();
        
        if (error || !session) {
          throw new Error('Unauth');
        }
        document.getElementById('adminName').textContent = session.user.email || 'Administrator';
        
        await loadInterns();
        loadAnalytics();
      } catch (err) {
        window.location.href = 'admin-login.html';
      }

      // Setup Search
      document.getElementById('searchInput').addEventListener('input', (e) => {
        renderTable(e.target.value);
      });

      // Setup Form Submit
      document.getElementById('internForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('btnSaveIntern').textContent = 'Saving...';
        document.getElementById('btnSaveIntern').disabled = true;

        const id = document.getElementById('editId').value;
        const payload = {
          intern_id: document.getElementById('f_internId').value,
          full_name: document.getElementById('f_fullName').value,
          email: document.getElementById('f_email').value,
          domain: document.getElementById('f_domain').value,
          status: document.getElementById('f_status').value,
          progress_percent: parseInt(document.getElementById('f_progress').value) || 0,
          start_date: document.getElementById('f_start').value || null,
          end_date: document.getElementById('f_end').value || null,
          photo: document.getElementById('f_photo').value || null
        };

        try {
          let resError = null;
          if (id) {
            const { error } = await window.supabaseClient.from('interns').update(payload).eq('id', id);
            resError = error;
          } else {
            const { error } = await window.supabaseClient.from('interns').insert([payload]);
            resError = error;
          }
          
          if (!resError) {
            closeModal();
            await loadInterns();
            loadAnalytics();
          } else {
            alert('Error saving intern: ' + resError.message);
          }
        } catch(err) {
          console.error(err);
        } finally {
          document.getElementById('btnSaveIntern').textContent = 'Save Intern';
          document.getElementById('btnSaveIntern').disabled = false;
        }
      });
    });

    async function loadAnalytics() {
      if (!allInterns) return;
      const total = allInterns.length;
      const active = allInterns.filter(i => i.status === 'Active').length;
      const completed = allInterns.filter(i => i.status === 'Completed').length;
      
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statCompleted').textContent = completed;
    }

    async function loadInterns() {
      try {
        const { data, error } = await window.supabaseClient.from('interns').select('*').order('created_at', { ascending: false });
        if(!error && data) {
          allInterns = data;
          renderTable();
        }
      } catch(e) {
        console.error("Error loading interns", e);
      }
    }

    function renderTable(filter = '') {
      const tbody = document.getElementById('internsTableBody');
      tbody.innerHTML = '';
      
      const filtered = allInterns.filter(i => 
        i.full_name.toLowerCase().includes(filter.toLowerCase()) || 
        i.intern_id.toLowerCase().includes(filter.toLowerCase())
      );

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem;">No interns found.</td></tr>`;
        return;
      }

      filtered.forEach(intern => {
        const tr = document.createElement('tr');
        const badgeClass = intern.status === 'Active' ? 'active' : (intern.status === 'Completed' ? 'completed' : 'inactive');
        
        tr.innerHTML = `
          <td style="font-family:monospace">${intern.intern_id}</td>
          <td style="font-weight:500">${intern.full_name}</td>
          <td>${intern.domain || '-'}</td>
          <td><span class="badge ${badgeClass}">${intern.status}</span></td>
          <td>
            <div style="width:100%; height:6px; background:var(--bg-tertiary); border-radius:3px; overflow:hidden;">
              <div style="height:100%; background:var(--accent); width:${intern.progress_percent}%"></div>
            </div>
          </td>
          <td>
            <div class="table-actions">
              <button class="btn btn-outline" style="padding:4px 8px" onclick='editIntern(${JSON.stringify(intern).replace(/'/g, "&apos;")})'>
                <svg width="14" height="14" fill="currentColor"><use href="#icon-edit"></use></svg>
              </button>
              <button class="btn btn-outline" style="padding:4px 8px; color:#ef4444" onclick="deleteIntern('${intern.id}')">
                <svg width="14" height="14" fill="currentColor"><use href="#icon-trash"></use></svg>
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      
      document.getElementById('pageTitle').textContent = tabId.charAt(0).toUpperCase() + tabId.slice(1);
    }

    function openModal() {
      document.getElementById('internForm').reset();
      document.getElementById('editId').value = '';
      document.getElementById('f_photo').value = '';
      if (typeof updateProfileImagePreview === 'function') updateProfileImagePreview('');
      document.getElementById('modalTitle').textContent = 'Add New Intern';
      document.getElementById('internModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('internModal').classList.remove('active');
    }

    function editIntern(intern) {
      document.getElementById('modalTitle').textContent = 'Edit Intern';
      document.getElementById('editId').value = intern.id;
      document.getElementById('f_internId').value = intern.intern_id;
      document.getElementById('f_fullName').value = intern.full_name;
      document.getElementById('f_email').value = intern.email;
      document.getElementById('f_domain').value = intern.domain || '';
      document.getElementById('f_status').value = intern.status || 'Active';
      document.getElementById('f_progress').value = intern.progress_percent || 0;
      document.getElementById('f_start').value = intern.start_date || '';
      document.getElementById('f_end').value = intern.end_date || '';
      document.getElementById('f_photo').value = intern.photo || '';
      if (typeof updateProfileImagePreview === 'function') updateProfileImagePreview(intern.photo);
      document.getElementById('internModal').classList.add('active');
    }

    async function deleteIntern(id) {
      if(!confirm('Are you sure you want to delete this intern?')) return;
      try {
        const { error } = await window.supabaseClient.from('interns').delete().eq('id', id);
        if (error) throw error;
        await loadInterns();
        loadAnalytics();
      } catch(e) { 
        console.error(e);
        alert('Error deleting intern: ' + e.message);
      }
    }

    async function logout() {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'admin-login.html';
    }

    // --- Profile Picture Upload Logic ---
    function updateProfileImagePreview(photoUrl) {
      const preview = document.getElementById('uploadPreview');
      const placeholder = document.getElementById('uploadPlaceholder');
      const overlay = document.getElementById('uploadOverlay');
      if (photoUrl) {
        const resolvedPhoto = (photoUrl.startsWith('http') || photoUrl.startsWith('assets') || photoUrl.startsWith('/'))
          ? photoUrl
          : `${window.SUPABASE_URL}/storage/v1/object/public/intern-profile-images/${photoUrl}`;
        preview.src = resolvedPhoto;
        preview.style.display = 'block';
        placeholder.style.display = 'none';
        overlay.querySelector('span').textContent = 'Replace';
      } else {
        preview.src = '';
        preview.style.display = 'none';
        placeholder.style.display = 'flex';
        overlay.querySelector('span').textContent = 'Upload';
      }
    }

    async function removeProfileImage() {
      const currentUrl = document.getElementById('f_photo').value;
      if (!currentUrl) return;
      if (!currentUrl.startsWith('http') && !currentUrl.startsWith('assets') && !currentUrl.startsWith('/')) {
        try {
           await window.supabaseClient.storage.from('intern-profile-images').remove([currentUrl]);
        } catch(e) { console.error('Failed to remove from storage', e); }
      }
      document.getElementById('f_photo').value = '';
      updateProfileImagePreview('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const uploadZone = document.getElementById('uploadZone');
      const fileInput = document.getElementById('f_photo_upload');
      
      if(uploadZone && fileInput) {
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
          e.preventDefault();
          uploadZone.classList.remove('dragover');
          if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            handleImageUpload(e.dataTransfer.files[0]);
          }
        });
        
        fileInput.addEventListener('change', (e) => {
          if (e.target.files && e.target.files[0]) {
            handleImageUpload(e.target.files[0]);
          }
        });
      }
    });

    async function handleImageUpload(file) {
      if (!file.type.startsWith('image/')) {
        alert('Invalid file format. Please upload an image.');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('File is too large. Maximum size is 5MB.');
        return;
      }

      const progressBar = document.getElementById('uploadProgressBar');
      const progressFill = document.getElementById('uploadProgressFill');
      progressBar.style.display = 'block';
      progressFill.style.width = '10%';

      try {
        const bitmap = await createImageBitmap(file);
        let width = bitmap.width;
        let height = bitmap.height;
        const max = 512;
        if (width > max || height > max) {
          if (width > height) { height = Math.round((height * max) / width); width = max; } 
          else { width = Math.round((width * max) / height); height = max; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0, width, height);
        
        progressFill.style.width = '40%';
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/webp', 0.8));
        
        const internId = document.getElementById('f_internId').value || 'new-intern';
        const timestamp = Date.now();
        const path = `${internId}/profile_${timestamp}.webp`;
        
        progressFill.style.width = '60%';

        const { data, error } = await window.supabaseClient.storage
          .from('intern-profile-images')
          .upload(path, blob, { contentType: 'image/webp', cacheControl: '3600', upsert: true });

        if (error) throw error;
        
        progressFill.style.width = '100%';
        
        const oldPhoto = document.getElementById('f_photo').value;
        if (oldPhoto && !oldPhoto.startsWith('http') && !oldPhoto.startsWith('assets') && !oldPhoto.startsWith('/')) {
           window.supabaseClient.storage.from('intern-profile-images').remove([oldPhoto]).catch(console.error);
        }

        document.getElementById('f_photo').value = path;
        updateProfileImagePreview(path);
      } catch (err) {
        console.error(err);
        alert('Failed to upload image: ' + err.message);
      } finally {
        setTimeout(() => { progressBar.style.display = 'none'; progressFill.style.width = '0%'; }, 500);
        document.getElementById('f_photo_upload').value = '';
      }
    }
  </script>
</body>
</html>
