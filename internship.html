<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Verification | Dremora</title>
  
  <meta name="description" content="Verify your Dremora internship and access your dashboard.">
  <meta name="theme-color" content="#090909">
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Dremora Design System -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .verify-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -50px; animation-delay: 0s; }
    .blob-2 { width: 450px; height: 450px; background: #3b82f6; bottom: -100px; right: -100px; animation-delay: -3s; }
    
    .hero-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .verify-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: var(--space-6);
    }

    .verify-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-2xl);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .verify-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .verify-header img {
      height: 48px;
      margin-bottom: var(--space-4);
    }

    .verify-header h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    
    .verify-header p {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--text-base);
      transition: all 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: var(--space-6);
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }
    
    .error-box.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-spinner { display: block; }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <main class="verify-page">
    <div class="hero-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="verify-container">
      <div class="verify-card">
        <div class="verify-header">
          <img src="assets/images/logo.png" alt="Dremora Logo">
          <h1>Internship Verification</h1>
          <p>Enter your details to view your dashboard</p>
        </div>

        <div id="verifyError" class="error-box">
          <span id="verifyErrorText"></span>
        </div>

        <form id="verifyForm">
          <div class="form-group">
            <label for="internId">Internship ID</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 576 512"><use href="#fa-id-card"></use></svg>
              <input type="text" id="internId" placeholder="DRM-INT-..." required>
            </div>
          </div>

          <div class="form-group">
            <label for="internName">Full Name</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 448 512"><use href="#fa-user"></use></svg>
              <input type="text" id="internName" placeholder="Enter your full name" required>
            </div>
          </div>

          <button type="submit" id="btnVerify" class="btn">
            <span class="btn-text">Verify Identity</span>
            <div class="btn-spinner"></div>
          </button>
        </form>
        
        <div style="margin-top: 24px; text-align: center;">
          <a href="admin-login.html" style="color: #9ca3af; font-size: 14px; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#9ca3af'">
            Admin Portal
          </a>
        </div>
      </div>
    </div>
  </main>

  <svg id="global-svg-sprite" xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="fa-id-card" viewBox="0 0 576 512"><path d="M0 96C0 60.7 28.7 32 64 32H512c35.3 0 64 28.7 64 64V416c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V96zM192 192C192 156.7 163.3 128 128 128S64 156.7 64 192s28.7 64 64 64s64-28.7 64-64zM64 352V384h256V352c0-35.3-28.7-64-64-64H128c-35.3 0-64 28.7-64 64zM512 128H352v64h160V128zm0 128H352v64h160V256zm0 128H352v64h160V384z"/></symbol>
    <symbol id="fa-user" viewBox="0 0 448 512"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0S96 57.3 96 128s57.3 128 128 128zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3z"/></symbol>
  </svg>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Centralized Supabase Client -->
  <script src="js/supabaseClient.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('verifyForm');
      const btn = document.getElementById('btnVerify');
      const errBox = document.getElementById('verifyError');
      const errText = document.getElementById('verifyErrorText');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const intern_id = document.getElementById('internId').value.trim();
        const full_name = document.getElementById('internName').value.trim();
        
        errBox.classList.remove('show');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
          // Query Supabase directly
          const { data, error } = await window.supabaseClient
            .from('interns')
            .select('intern_id, status')
            .eq('intern_id', intern_id)
            .ilike('full_name', full_name)
            .single();

          if (error || !data) {
            throw new Error('Invalid Internship ID or Name');
          }

          // Phase 4: Store in sessionStorage
          sessionStorage.setItem('internId', data.intern_id);

          // Success - Redirect to dashboard immediately without URL params
          window.location.href = 'intern-dashboard.html';
          
        } catch (error) {
          errText.textContent = error.message || 'An error occurred connecting to the database.';
          errBox.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
